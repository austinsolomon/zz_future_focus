<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e16" />
  <meta name="description" content="A sleek, chronological flashcard deck on the evolution of neural network architectures — from the perceptron to CNNs, RNNs, transformers, LLMs and Claude Code." />
  <title>ML — Neural Net Evolution · Flashcards</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body class="is-intro">
  <div class="app">

    <!-- CONSOLIDATED TOP BAR -->
    <header class="topbar">
      <!-- advancing chronological timeline (hero) -->
      <div class="tline" id="tline" aria-hidden="true">
        <div class="tline-track"><i class="tline-fill" id="tlFill"></i></div>
        <div class="tline-ticks" id="tlTicks"></div>
        <div class="tline-marker" id="tlMarker"><span class="tline-year" id="yearText">—</span></div>
      </div>
      <div id="meter" class="metabar">
        <span class="lvl" id="meterBadge">1</span>
        <div class="m-hint" id="meterHint"><span id="posText">card 1</span><span class="sep"> · </span><span id="streakChip">strk <b id="streak">0</b></span><span class="sep"> · </span>best <b id="best">0</b><span class="sep"> · </span><b id="score">0/0</b></div>
        <span class="m-tools">
          <button id="introBtn" class="icon-btn" title="LLM overview" aria-label="LLM overview">3D</button>
          <button id="dirToggle" class="icon-btn" title="Flip direction (A↔B)" aria-label="Flip direction">A→B</button>
          <button id="restartRunBtn" class="icon-btn" title="Restart from the start" aria-label="Restart">↺</button>
          <button id="resetBtn" class="icon-btn" title="Reset all progress" aria-label="Reset all">⌫</button>
        </span>
      </div>
    </header>

    <!-- CARD STAGE -->
    <main class="stage" id="stage">

      <!-- INTRO: 3D LLM overview (shown first on load) -->
      <section class="intro" id="intro">
        <canvas id="vizCanvas" class="viz-canvas"></canvas>
        <div class="intro-cap">
          <div class="intro-kicker">INSIDE THE FACTORY</div>
          <div class="intro-flow">tokens → embeddings → transformer × N → next-token</div>
          <div class="intro-sub">Follow one data point travelling the whole machine — drag to rotate, then press Begin.</div>
        </div>
      </section>

      <div class="card" id="card" hidden>
        <div class="card-top">
          <div class="card-concept" id="cardConcept">—</div>
          <div class="card-year" id="cardYear">—</div>
        </div>

        <!-- concept diagram (minimal schematic) -->
        <div class="viz" id="viz" aria-hidden="true"></div>

        <div class="prompt" id="prompt">Loading deck…</div>

        <div class="options" id="options"></div>

        <div class="answer" id="answerBlock" hidden>
          <div class="ans-row"><span class="ans-tag">A</span><span id="ansA"></span></div>
          <div class="ans-row"><span class="ans-tag b">B</span><span id="ansB"></span></div>
          <div class="ans-notes" id="ansNotes"></div>
        </div>

        <div class="tags-row" id="tagsRow"></div>
      </div>
    </main>

    <!-- BOTTOM NAV — left-thumb zone -->
    <nav class="navbar">
      <button id="nextBtn" class="nav-next" aria-label="Next card">Next ›</button>
      <button id="revealBtn" class="nav-sec" aria-label="Reveal answer">Reveal</button>
      <button id="prevBtn" class="nav-sec" aria-label="Previous card">‹ Prev</button>
    </nav>

  </div>

  <!-- TIMELINE COMPLETE OVERLAY -->
  <div id="overlay" class="overlay" hidden>
    <div class="overlay-card">
      <div class="overlay-kicker">TIMELINE CLEARED</div>
      <h2 class="overlay-title" id="overlayTitle">TIMELINE COMPLETE</h2>
      <p class="overlay-sub" id="overlaySub"></p>
      <div class="overlay-actions">
        <button id="restartBtn" class="nav-next overlay-btn">Replay from the start</button>
        <button id="overlayCloseBtn" class="nav-sec overlay-btn">Back to overview</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=5"></script>
</body>
</html>
